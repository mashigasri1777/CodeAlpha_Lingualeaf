<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinguaLeaf Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="page-wrapper">
    <header class="navbar">
      <div class="logo">LinguaLeaf</div>
      <p class="tagline">Elegant translation in earthy tones</p>
    </header>

    <main class="hero-section">
      <section class="hero-text">
        <h1>Language Translation Tool</h1>
        <p>
          Translate text beautifully using a clean interface, smart language selection,
          and a polished green-beige UI built for your internship task.
        </p>
      </section>

      <section class="translator-card">
        <div class="selectors">
          <div class="select-group">
            <label for="source_lang">Source Language</label>
            <select id="source_lang">
              <option value="auto">Auto Detect</option>
              <option value="en">English</option>
              <option value="ta">Tamil</option>
              <option value="hi">Hindi</option>
              <option value="fr">French</option>
              <option value="de">German</option>
              <option value="es">Spanish</option>
            </select>
          </div>

          <button class="swap-btn" id="swapBtn" type="button">⇄</button>

          <div class="select-group">
            <label for="target_lang">Target Language</label>
            <select id="target_lang">
              <option value="ta">Tamil</option>
              <option value="en">English</option>
              <option value="hi">Hindi</option>
              <option value="fr">French</option>
              <option value="de">German</option>
              <option value="es">Spanish</option>
            </select>
          </div>
        </div>

        <div class="text-grid">
          <div class="panel">
            <label for="inputText">Enter Text</label>
            <textarea id="inputText" placeholder="Type text here..."></textarea>
            <div class="panel-footer">
              <span id="charCount">0 characters</span>
            </div>
          </div>

          <div class="panel">
            <label for="outputText">Translated Text</label>
            <textarea id="outputText" placeholder="Translation appears here..." readonly></textarea>
            <div class="panel-footer">
              <span id="detectedLang">Detected: -</span>
            </div>
          </div>
        </div>

        <div class="action-row">
          <button class="primary-btn" id="translateBtn" type="button">Translate</button>
          <button class="secondary-btn" id="copyBtn" type="button">Copy</button>
          <button class="secondary-btn" id="speakBtn" type="button">Speak</button>
          <button class="secondary-btn" id="clearBtn" type="button">Clear</button>
        </div>

        <p class="status-message" id="statusMessage"></p>
      </section>
    </main>
  </div>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
