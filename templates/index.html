<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>LinguaLeaf Translator</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/style.css') }}">

    <!-- Google Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

    <div class="container">

        <!-- TITLE -->

        <h1 class="title">

            LinguaLeaf

        </h1>

        <!-- LANGUAGE SELECTORS -->

        <div class="selectors">

            <select id="sourceLang">

                <option value="auto">
                    Auto Detect
                </option>

                <option value="en">
                    English
                </option>

                <option value="ta">
                    Tamil
                </option>

                <option value="hi">
                    Hindi
                </option>

                <option value="fr">
                    French
                </option>

                <option value="es">
                    Spanish
                </option>

            </select>

            <button id="swapBtn">

                ⇄

            </button>

            <select id="targetLang">

                <option value="ta">
                    Tamil
                </option>

                <option value="en">
                    English
                </option>

                <option value="hi">
                    Hindi
                </option>

                <option value="fr">
                    French
                </option>

                <option value="es">
                    Spanish
                </option>

            </select>

        </div>

        <!-- INPUT -->

        <textarea
            id="inputText"
            placeholder="Enter text..."></textarea>

        <!-- OUTPUT -->

        <textarea
            id="outputText"
            placeholder="Translation..."
            readonly></textarea>

        <!-- BUTTONS -->

        <div class="buttons">

            <button id="translateBtn">

                Translate

            </button>

            <button id="copyBtn">

                Copy

            </button>

            <button id="speakBtn">

                Speak

            </button>

        </div>

    </div>

<script src="{{ url_for('static',
filename='js/script.js') }}"></script>

</body>

</html>
