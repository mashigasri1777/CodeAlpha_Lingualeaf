<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>LinguaLeaf Translator</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <div class="container">

        <!-- HEADER -->

        <div class="header">

            <h1>LinguaLeaf Translator</h1>

            <p>
                Translate text beautifully using a clean interface,
                smart language selection, and an elegant earthy UI.
            </p>

        </div>

        <!-- LANGUAGE SELECTORS -->

        <div class="selectors">

            <div class="language-box">

                <label>Source Language</label>

                <select id="sourceLang">

                    <option value="auto">Auto Detect</option>

                    <option value="en">English</option>

                    <option value="ta">Tamil</option>

                    <option value="hi">Hindi</option>

                    <option value="fr">French</option>

                    <option value="es">Spanish</option>

                    <option value="de">German</option>

                </select>

            </div>

            <button id="swapBtn">⇄</button>

            <div class="language-box">

                <label>Target Language</label>

                <select id="targetLang">

                    <option value="ta">Tamil</option>

                    <option value="en">English</option>

                    <option value="hi">Hindi</option>

                    <option value="fr">French</option>

                    <option value="es">Spanish</option>

                    <option value="de">German</option>

                </select>

            </div>

        </div>

        <!-- INPUT AREA -->

        <div class="text-section">

            <label>Enter Text</label>

            <textarea
                id="inputText"
                placeholder="Type text here..."></textarea>

            <div class="char-count">

                <span id="charCount">0</span> characters

            </div>

        </div>

        <!-- OUTPUT AREA -->

        <div class="text-section">

            <label>Translated Text</label>

            <textarea
                id="outputText"
                placeholder="Translation appears here..."
                readonly></textarea>

        </div>

        <!-- DETECTED LANGUAGE -->

        <div class="detected">

            Detected:
            <span id="detectedLang">-</span>

        </div>

        <!-- BUTTONS -->

        <div class="buttons">

            <button id="translateBtn">

                Translate

            </button>

            <button id="copyBtn">

                Copy

            </button>

            <button id="speakBtn">

                Speak

            </button>

            <button id="clearBtn">

                Clear

            </button>

        </div>

    </div>

    <script src="{{ url_for('static',
    filename='js/script.js') }}"></script>

</body>

</html>
